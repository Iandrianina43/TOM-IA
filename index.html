<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOA IA V1</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

    <style>
        :root {
            --primary: #00B7C4;
            --bg: #ffffff;
            --text: #111827;
            --gray: #6b7280;
            --card: #f9fafb;
        }

        body,
        html {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .hero-section {
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            letter-spacing: -3px;
            margin: 0;
            text-transform: uppercase;
        }

        .v1 {
            font-weight: 300;
            font-size: .4em;
            letter-spacing: 4px;
            color: var(--primary);
            display: block;
            margin-top: -10px;
        }

        /* Controls */
        .controls {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            display: none;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .controls select {
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        /* Grid */
        .listings-container {
            max-width: 1200px;
            margin: 0 auto 30px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #eee;
            transition: .2s;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        .card-price {
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card-title {
            font-weight: 700;
            margin-bottom: 5px;
        }

        .card-location {
            font-size: .9rem;
            color: var(--gray);
            margin-bottom: 15px;
        }

        .card-desc {
            font-size: .85rem;
            color: #4b5563;
        }

        /* Skeleton */
        .skeleton {
            background: #e5e7eb;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        .skeleton::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .6), transparent);
            animation: shine 1.2s infinite;
        }

        @keyframes shine {
            100% {
                transform: translateX(100%)
            }
        }

        .skel-line {
            height: 14px;
            margin-bottom: 10px;
        }

        /* Pagination */
        .pagination {
            max-width: 1200px;
            margin: 10px auto 60px;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .pagination button {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            background: white;
            cursor: pointer;
        }

        .pagination button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .pagination button:disabled {
            opacity: .5;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <section class="hero-section">
        <h1>NOA IA <span class="v1">V1</span></h1>
    </section>

    <div class="controls" id="controls">
        <select id="filterLieu">
            <option value="all">Tous les lieux</option>
        </select>

        <select id="pageSize">
            <option value="6">6</option>
            <option value="9" selected>9</option>
            <option value="12">12</option>
        </select>

        <span id="stats" style="margin-left:auto;color:#6b7280;"></span>
    </div>

    <div class="listings-container" id="listings"></div>
    <div class="pagination" id="pagination"></div>

    <div id="n8n-chat"></div>

    <script type="module">

        const listingsBox = document.getElementById('listings');
const filterLieu = document.getElementById('filterLieu');
const pageSizeSelect = document.getElementById('pageSize');
const paginationBox = document.getElementById('pagination');
const controls = document.getElementById('controls');
const stats = document.getElementById('stats');

let listingsData = [];
let currentPage = 1;

/* Skeleton rendering */
function showSkeleton(count = 6){
    listingsBox.innerHTML = '';
    for(let i=0;i<count;i++){
        const card = document.createElement('div');
        card.className='card';
        card.innerHTML=`
            <div class="skeleton skel-line" style="width:40%"></div>
            <div class="skeleton skel-line" style="width:70%"></div>
            <div class="skeleton skel-line" style="width:50%"></div>
            <div class="skeleton skel-line" style="width:90%"></div>
        `;
        listingsBox.appendChild(card);
    }
}

/* Escape */
function escapeHtml(text){
    return String(text)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
}

async function fetchAnnonces(){
    showSkeleton(9);

    const response = await fetch('https://automatika.viewdns.net/webhook/getallannonces');
    const data = await response.json();
    listingsData = Array.isArray(data)?data:[];

    const lieux=[...new Set(listingsData.map(i=>(i.lieu||'Inconnu').trim()))]
        .sort((a,b)=>a.localeCompare(b,'fr'));

    lieux.forEach(l=>{
        const opt=document.createElement('option');
        opt.value=l;
        opt.innerText=l;
        filterLieu.appendChild(opt);
    });

    controls.style.display='flex';
    renderListings(1);
}

function renderListings(page=1){

    currentPage=page;
    const pageSize=parseInt(pageSizeSelect.value,10);
    const selectedLieu=filterLieu.value;

    const filtered=listingsData.filter(item=>
        selectedLieu==='all'||item.lieu===selectedLieu
    );

    const totalItems=filtered.length;
    const totalPages=Math.max(1,Math.ceil(totalItems/pageSize));

    if(currentPage>totalPages) currentPage=totalPages;

    showSkeleton(pageSize);

    setTimeout(()=>{

        const start=(currentPage-1)*pageSize;
        const pageItems=filtered.slice(start,start+pageSize);

        listingsBox.innerHTML='';

        pageItems.forEach(item=>{
            const card=document.createElement('div');
            card.className='card';
            card.innerHTML=`
                <div class="card-price">${new Intl.NumberFormat('fr-FR').format(item.prix)} €</div>
                <div class="card-title">${escapeHtml(item.nom)}</div>
                <div class="card-location">${escapeHtml(item.lieu)}</div>
                <div class="card-desc">${escapeHtml(item.description)}</div>
            `;
            listingsBox.appendChild(card);
        });

        stats.innerText=`${totalItems} annonce(s) — page ${currentPage}/${totalPages}`;
        renderPagination(totalPages);

        window.scrollTo({top:listingsBox.offsetTop-20,behavior:'smooth'});

    },300);
}

function renderPagination(totalPages){

    paginationBox.innerHTML='';

    const createBtn=(p)=>{
        const btn=document.createElement('button');
        btn.innerText=p;
        if(p===currentPage) btn.classList.add('active');
        btn.onclick=()=>renderListings(p);
        return btn;
    };

    const prev=document.createElement('button');
    prev.innerText='Préc';
    prev.disabled=currentPage===1;
    prev.onclick=()=>renderListings(currentPage-1);
    paginationBox.appendChild(prev);

    const maxButtons=5;
    let start=Math.max(1,currentPage-2);
    let end=Math.min(totalPages,start+maxButtons-1);

    if(start>1){
        paginationBox.appendChild(createBtn(1));
        if(start>2){
            const dots=document.createElement('span');
            dots.innerText='...';
            dots.style.padding='8px';
            paginationBox.appendChild(dots);
        }
    }

    for(let i=start;i<=end;i++){
        paginationBox.appendChild(createBtn(i));
    }

    if(end<totalPages){
        if(end<totalPages-1){
            const dots=document.createElement('span');
            dots.innerText='...';
            dots.style.padding='8px';
            paginationBox.appendChild(dots);
        }
        paginationBox.appendChild(createBtn(totalPages));
    }

    const next=document.createElement('button');
    next.innerText='Suiv';
    next.disabled=currentPage===totalPages;
    next.onclick=()=>renderListings(currentPage+1);
    paginationBox.appendChild(next);
}

filterLieu.addEventListener('change',()=>renderListings(1));
pageSizeSelect.addEventListener('change',()=>renderListings(1));

fetchAnnonces();

</script>
<script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

        createChat({
            webhookUrl: 'https://automatika.viewdns.net/webhook/e1fb14c1-1711-458c-92a9-be6e943bf011/chat',
            target: '#n8n-chat',
            mode: 'window',
            chatInputKey: 'chatInput',
            chatSessionKey: 'sessionId',
            loadPreviousSession: false,
            showWelcomeScreen: false,
            defaultLanguage: 'fr',
            enableStreaming: false,
            initialMessages: [
                'Bonjour, je suis Noa.',
                'Je vous accompagne dans votre recherche immobilière.',
                'Dites-moi simplement ce que vous recherchez.'
            ],
            i18n: {
                fr: {
                    title: 'Noa IA V1',
                    subtitle: 'Assistant Immobilier',
                    footer: 'Simplifiez votre recherche',
                    getStarted: 'Commencer',
                    inputPlaceholder: 'Votre critère (ex: Paris, 3 pièces...)',
                }
            }
        });

</script>


</body>

</html>
